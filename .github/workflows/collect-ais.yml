name: Collect AIS

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install ws rss-parser --no-save
      - run: node scripts/collect-ais.mjs
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          MAKE_ALERT_WEBHOOK: ${{ secrets.MAKE_ALERT_WEBHOOK }}
      - run: node scripts/scrape-carriers.mjs
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vessel-counts.json data/vessel-positions.json data/carriers.json
          git diff --staged --quiet || git commit -m "chore: hourly collection (AIS + carriers)"
          git push
